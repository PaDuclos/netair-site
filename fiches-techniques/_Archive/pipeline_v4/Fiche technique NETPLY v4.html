document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

le=\"font-size:11px; font-weight:700; color:#0F3261; letter-spacing:1.2px; text-transform:uppercase;\">Description<\u002Fdiv>\n              <div style=\"width:34px; height:2px; background:#0897A5; margin:5px 0 8px 0;\"><\u002Fdiv>\n              <p style=\"margin:0; font-size:13px; line-height:1.55; color:#3a4654; text-wrap:pretty;\">Le filtre plissé NETPLY constitue la première barrière filtrante des centrales de traitement d'air. Son média synthétique plissé offre une grande surface active dans un encombrement réduit, garantissant un faible différentiel de pression et une durée de vie optimisée. Disponible de G3 à M5 selon EN 779 / EN ISO 16890, il s'adapte à toutes les dimensions de CTA.<\u002Fp>\n              <div style=\"font-size:11px; font-weight:700; color:#0F3261; letter-spacing:1.2px; text-transform:uppercase; margin-top:11px;\">Points clés<\u002Fdiv>\n              <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:7px 14px; margin-top:8px; font-size:12.5px; color:#27313e;\">\n                <div style=\"display:flex; align-items:center; gap:8px;\"><span style=\"width:8px; height:8px; background:#0897A5; display:inline-block; flex:none;\"><\u002Fspan>Faible perte de charge<\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:8px;\"><span style=\"width:8px; height:8px; background:#0897A5; display:inline-block; flex:none;\"><\u002Fspan>Longue durée de vie<\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:8px;\"><span style=\"width:8px; height:8px; background:#0897A5; display:inline-block; flex:none;\"><\u002Fspan>Cadre carton ou métal<\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:8px;\"><span style=\"width:8px; height:8px; background:#0897A5; display:inline-block; flex:none;\"><\u002Fspan>Sans fibre de verre<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Caractéristiques techniques -->\n          <div font-family=\"'Instrument Sans',sans-serif\" font-size=\"11.5\" font-weight=\"600\" fill=\"#0F3261\">Perte de charge (Pa)<\u002Ftext>\n            <\u002Fsvg>\n            <div style=\"display:flex; gap:14px 18px; align-items:center; margin-top:3mm; font-size:11px; color:#3a4654; flex-wrap:wrap;\">\n              <div style=\"display:flex; align-items:center; gap:7px; opacity:{{ opG4 }};\"><span style=\"width:22px; height:3px; background:#0F3261; display:inline-block; border-radius:2px;\"><\u002Fspan>G4 · Coarse 65% — 48 mm<\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:7px; opacity:{{ opG4 }};\"><span style=\"width:22px; height:3px; background:#6B8FC2; display:inline-block; border-radius:2px;\"><\u002Fspan>G4 · Coarse 65% — 98 mm<\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:7px; opacity:{{ opM5 }};\"><span style=\"width:22px; height:3px; background:#0897A5; display:inline-block; border-radius:2px;\"><\u002Fspan>M5 · ePM10 50% — 48 mm<\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:7px; opacity:{{ opM5 }};\"><span style=\"width:22px; height:3px; background:#7FCBD3; display:inline-block; border-radius:2px;\"><\u002Fspan>M5 · ePM10 50% — 98 mm<\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:7px;\"><span style=\"width:11px; height:11px; border-radius:50%; background:#fff; border:2px solid #0F3261; display:inline-block;\"><\u002Fspan>Config. sélectionnée<\u002Fdiv>\n              <div style=\"margin-left:auto; font-style:italic; color:#5A6573;\">Média propre — air à 20 °C<\u002Fdiv>\n              <div style=\"flex-basis:100%; height:0;\"><\u002Fdiv>\n              <div><span style=\"font-weight:700; color:#0F3261;\">ΔP initiale à 3400 m³/h (592×592) :<\u002Fspan> {{ refLine }} <span style=\"color:#8b97a6;\">(48 / 98 mm)<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Section calculateur -->\n          <div style=\"display:flex; align-items:center; gap:10px; margin-top:9mm;\">\n            <span style=\"font-size:11px; font-weight:700; color:#0F3261; letter-spacing:1.2px; text-transform:uppercase; white-space:nowrap;\">Calculateur énergétique<\u002Fspan>\n            <span style=\"flex:1; height:1px; background:#0F3261;\"><\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:12px; color:#5A6573; margin-top:5px; line-height:1.5;\">Estimez la consommation du ventilateur liée à la perte de charge du filtre sur une année de fonctionnement. Ajustez les paramètres ci-dessous.<\u002Fdiv>\n\n          <div style=\"display:grid; grid-template-columns:1fr 74mm; gap:8mm; margin-top:6mm; align-items:stretch;\">\n            <!-- inputs -->\n            <div style=\"display:flex; flex-direction:column; gap:13px; padding-top:2px;\">\n              <div>\n                <div style=\"font-size:12.5px; font-weight:600; color:#0F3261; margin-bottom:6px;\">Efficacité<\u002Fdiv>\n                <div style=\"display:flex; gap:8px;\">\n                  <button onclick=\"{{ onEffG4 }}\" style=\"{{ btnG4Style }}\">G4 · Coarse 65%<\u002Fbutton>\n                  <button onclick=\"{{ onEffM5 }}\" style=\"{{ btnM5Style }}\">M5 · ePM10 50%<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"font-size:12.5px; font-weight:600; color:#0F3261; margin-bottom:6px;\">Épaisseur du filtre<\u002Fdiv>\n                <div style=\"display:flex; gap:8px;\">\n                  <button onclick=\"{{ onThick48 }}\" style=\"{{ btn48Style }}\">48 mm<\u002Fbutton>\n                  <button onclick=\"{{ onThick98 }}\" style=\"{{ btn98Style }}\">98 mm<\u002Fbutton>\n                <\u002Fdiv>\n                <div style=\"display:flex; gap:6px; margin-top:9px;\">\n                  <div style=\"flex:1; background:#F2F6FB; border-radius:6px; padding:7px 9px; text-align:center;\"><div style=\"font-size:9px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:#8b97a6;\">ΔP initiale<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:#0F3261; margin-top:2px;\">{{ dpInit }} Pa<\u002Fdiv><\u002Fdiv>\n                  <div style=\"flex:1; background:#F2F6FB; border-radius:6px; padding:7px 9px; text-align:center;\"><div style=\"font-size:9px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:#8b97a6;\">ΔP finale<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:#0F3261; margin-top:2px;\">{{ dpFinal }} Pa<\u002Fdiv><\u002Fdiv>\n                  <div style=\"flex:1; background:#E6F5F7; border:1px solid #B6E2E8; border-radius:6px; padding:7px 9px; text-align:center;\"><div style=\"font-size:9px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:#0897A5;\">ΔP moyenne<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:#0897A5; font-weight:500; margin-top:2px;\">{{ dpAvg }} Pa<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-size:10px; color:#8b97a6; margin-top:6px; line-height:1.4;\">ΔP finale = ΔP initiale + {{ effAdd }} Pa (EN 13053 · {{ effRule }})<\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;\">\n                  <span style=\"font-size:12.5px; font-weight:600; color:#0F3261;\">Dimensions du filtre <span style=\"font-weight:400; color:#8b97a6;\">(mm)<\u002Fspan><\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#0897A5;\">{{ area }} m² · {{ vel }} m/s<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex; gap:10px; align-items:center;\">\n                  <div style=\"flex:1; display:flex; align-items:center; gap:7px;\">\n                    <span style=\"font-size:11px; font-weight:600; color:#5A6573; width:12px;\">L<\u002Fspan>\n                    <input type=\"number\" min=\"50\" max=\"2000\" value=\"{{ lenVal }}\" oninput=\"{{ onLen }}\" style=\"width:100%; font-family:'IBM Plex Mono',monospace; font-size:13px; color:#0F3261; border:1.5px solid #C9D7E8; border-radius:6px; padding:7px 9px; outline:none; box-sizing:border-box;\">\n                  <\u002Fdiv>\n                  <span style=\"color:#8b97a6; font-size:13px;\">×<\u002Fspan>\n                  <div style=\"flex:1; display:flex; align-items:center; gap:7px;\">\n                    <span style=\"font-size:11px; font-weight:600; color:#5A6573; width:14px;\">H<\u002Fspan>\n                    <input type=\"number\" min=\"50\" max=\"2000\" value=\"{{ widVal }}\" oninput=\"{{ onWid }}\" style=\"width:100%; font-family:'IBM Plex Mono',monospace; font-size:13px; color:#0F3261; border:1.5px solid #C9D7E8; border-radius:6px; padding:7px 9px; outline:none; box-sizing:border-box;\">\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px;\">\n                  <span style=\"font-size:12.5px; font-weight:600; color:#0F3261;\">Débit d'air<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:#0897A5; font-weight:500;\">{{ debit }} m³/h<\u002Fspan>\n                <\u002Fdiv>\n                <input type=\"range\" min=\"500\" max=\"6000\" step=\"50\" value=\"{{ debit }}\" oninput=\"{{ onDebit }}\" style=\"width:100%; accent-color:#0897A5;\">\n              <\u002Fdiv>\n              <div>\n                <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px;\">\n                  <span style=\"font-size:12.5px; font-weight:600; color:#0F3261;\">Heures de fonctionnement<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono', div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:2px;\">\n                  <span style=\"font-size:9.5px; font-weight:700; letter-spacing:1.4px; text-transform:uppercase; color:#7FB0D8;\">Étiquette énergétique<\u002Fspan>\n                  <span style=\"display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:6px; background:{{ classColor }}; color:#fff; font-size:16px; font-weight:700; box-shadow:0 0 0 2px rgba(255,255,255,.2);\">{{ classLetter }}<\u002Fspan>\n                <\u002Fdiv>\n                <svg viewBox=\"0 0 200 116\" style=\"width:100%; height:auto; display:block;\">\n                  <defs>\n                    <linearGradient id=\"gaugeGrad\" gradientUnits=\"userSpaceOnUse\" x1=\"28\" y1=\"0\" x2=\"172\" y2=\"0\">\n                      <stop offset=\"0%\" stop-color=\"#1B9E5A\"><\u002Fstop>\n                      <stop offset=\"28%\" stop-color=\"#7FB833\"><\u002Fstop>\n                      <stop offset=\"52%\" stop-color=\"#F2C53D\"><\u002Fstop>\n                      <stop offset=\"76%\" stop-color=\"#E8852B\"><\u002Fstop>\n                      <stop offset=\"100%\" stop-color=\"#D6402F\"><\u002Fstop>\n                    <\u002FlinearGradient>\n                  <\u002Fdefs>\n                  <!-- bande dégradée vert → rouge -->\n                  <path d=\"M 28 95 A 72 72 0 0 1 172 95\" fill=\"none\" stroke=\"url(#gaugeGrad)\" stroke-width=\"15\" stroke-linecap=\"round\"><\u002Fpath>\n                  <!-- aiguille -->\n                  <line x1=\"100\" y1=\"95\" x2=\"{{ needleX }}\" y2=\"{{ needleY }}\" stroke=\"#fff\" stroke-width=\"3.5\" stroke-linecap=\"round\"><\u002Fline>\n                  <circle cx=\"100\" cy=\"95\" r=\"7\" fill=\"#fff\"><\u002Fcircle>\n                  <circle cx=\"100\" cy=\"95\" r=\"3.2\" fill=\"#0F3261\"><\u002Fcircle>\n                  <!-- repères -->\n                  <text x=\"24\" y=\"110\" text-anchor=\"start\" font-family=\"'Instrument Sans',sans-serif\" font-size=\"8.5\" font-weight=\"600\" fill=\"#9DB8D6\">Faible conso.<\u002Ftext>\n                  <text x=\"176\" y=\"110\" text-anchor=\"end\" font-family=\"'Instrument Sans',sans-serif\" font-size=\"8.5\" font-weight=\"600\" fill=\"#9DB8D6\">Énergivore<\u002Ftext>\n                <\u002Fsvg>\n                <div style=\"font-size:11px; color:#cdd9e8; text-align:center; margin-top:2px;\">{{ classVerdict }} <span style=\"color:#9DB8D6;\">· ΔP moyenne {{ dpAvg }} Pa<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"height:1px; background:rgba(255,255,255,0.16);\"><\u002Fdiv>\n\n              <!-- Deux chiffres clés -->\n              <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:4mm; align-items:stretch;\">\n                <div style=\"background:rgba(255,255,255,.06); border-radius:8px; padding:4mm 3mm; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; min-width:0;\">\n                  <div style=\"font-size:9px; font-weight:700; letter-spacing:1.1px; text-transform:uppercase; color:#7FB0D8;\">Consommation<\u002Fdiv>\n                  <div style=\"display:flex; align-items:baseline; justify-content:center; gap:4px; margin-top:7px; white-space:nowrap;\"><span style=\"font-size:29px; font-weight:700; line-height:.95; font-variant-numeric:tabular-nums;\">{{ kwh }}<\u002Fspan><span style=\"font-size:12px; color:#cdd9e8;\">kWh<\u002Fspan><\u002Fdiv>\n                  <div style=\"font-size:9.5px; color:#9DB8D6; margin-top:5px;\">sur {{ heures }} h/an<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"background:rgba(63,198,212,.12); border:1px solid rgba(63,198,212,.3); border-radius:8px; padding:4mm 3mm; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; min-width:0;\">\n                  <div style=\"font-size:9px; font-weight:700; letter-spacing:1.1px; text-transform:uppercase; color:#3FC6D4;\">Coût<\u002Fdiv>\n                  <div style=\"display:flex; align-items:baseline; justify-content:center; gap:4px; margin-top:7px; white-space:nowrap;\"><span style=\"font-size:29px; font-weight:700; line-height:.95; color:#3FC6D4; font-variant-numeric:tabular-nums;\">{{ cost }}<\u002Fspan><span style=\"font-size:12px; color:#cdd9e8;\">€<\u002Fspan><\u002Fdiv>\n                  <div style=\"font-size:9.5px; color:#9DB8D6; margin-top:5px;\">sur {{ heures }} h/an<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"height:1px; background:rgba(255,255,255,0.16);\"><\u002Fdiv>\n\n              <div style=\"display:flex; justify-content:space-between; align-items:baseline;\">\n                <span style=\"font-size:12px; color:#cdd9e8;\">Puissance absorbée<\u002Fspan>\n                <span style=\"font-family:'IBM Plex Mono',monospace; font-size:13.5px; color:#fff;\">{{ power }} W<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex; justify-content:space-between; align-items:baseline;\">\n                <span style=\"font-size:12px; color:#cdd9e8;\">Émissions CO₂<\u002Fspan>\n                <span style=\"font-family:'IBM Plex Mono',monospace; font-size:13.5px; color:#fff;\">{{ co2 }} kg/an<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:7mm; background:#F2F6FB; border-left:3px solid #0897A5; padding:9px 14px; font-size:10.5px; color:#5A6573; line-height:1.55;\">\n            <strong style=\"color:#0F3261;\">Méthode :<\u002Fstrong> P = (Q ⁄ 3600) × ΔP ⁄ η &nbsp;·&nbsp; Énergie = P × heures de fonctionnement. Valeurs indicatives à but de comparaison — base CO₂ 0,052 kgCO₂/kWh (mix électrique France). η = rendement global du moto-ventilateur.\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n        <!-- Footer -->\n        <div style=\"margin:0; background:#0F3261; color:#cdd9e8; height:10mm; display:flex; align-items:center; justify-content:space-between; padding:0 12mm; font-size:11px;\">\n          <span style=\"font-weight:600; color:#fff;\">Netair SAS<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; color:#9DB8D6; letter-spacing:.3px;\">Fiche n° FT-NETPLY-001<\u002Fspan>\n          <span>v1.0 — 20/06/2026 — Page 2/2<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { debit: 3400, heures: 6000, eta: 55, prix: 0.18, thick: 48, eff: 'g4', dispG4: true, dispM5: false, len: 592, wid: 592 };\n\n  renderVals() {\n    const s = this.state;\n    // Profils filtre : ΔP propre à 3400 m³/h (592×592 ≈ 2,69 m/s) selon efficacité × épaisseur\n    /*PDC-NETAIR-START*/\n    const POLY = {\n      g4: { 48: {a:5.3818,b:9.7629,c:-2.1429}, 98: {a:5.6092,b:8.0507,c:-2.7857} },\n      m5: { 48: {a:6.1398,b:9.2823,c:-0.0714}, 98: {a:6.1398,b:7.6601,c:-2.8571} },\n    };\n    /*PDC-NETAIR-END*/\n    const pdc = (co, v) => Math.max(0, co.a*v*v + co.b*v + co.c);\n    // EN 13053 : ΔP finale = ΔP initiale + 50 Pa (Coarse) ou + 100 Pa (ePM10/ePM2,5/ePM1)\n    const ADD = { g4: 50, m5: 100 };\n    const RULE = { g4: 'classe Coarse', m5: 'classe ePM10' };\n    const eff = s.eff;\n    let showG4 = s.dispG4 !== false;\n    let showM5 = !!s.dispM5;\n    if (!showG4 && !showM5) showG4 = true; // au moins une courbe affichée\n    const co = POLY[eff][s.thick];\n    const fr = n => Math.round(n).toLocaleString('fr-FR');\n\n    // Axe X = vitesse de passage (m/s) : une seule courbe valable pour toutes les dimensions\n    const Vmax = 3.17;   // limite de la plage de fonctionnement\n    const Aref = 0.592 * 0.592;\n    const Vnom = (3400 / 3600) / Aref; // vitesse de passage nominale ≈ 2,69 m/s\n    const mapX = v => 52 + (v / Vmax) * 528;\n    const mapY = p => 250 - (Math.min(p, 120) / 120) * 234;\n    const curve = (co) => {\n      const pts = [];\n      for (let v = 0; v <= Vmax - 1e-9; v += 0.1) {\n        const p = pdc(co, v);\n        pts.push(mapX(v).toFixed(1) + ',' + mapY(p).toFixed(1));\n      }\n      pts.push(mapX(Vmax).toFixed(1) + ',' + mapY(pdc(co, Vmax)).toFixed(1));\n      return 'M' + pts.join(' L');\n    };\n    // Quatre courbes : G4·Coarse et M5·ePM10, chacune en 48 et 98 mm\n    const effLabel = eff === 'g4' ? 'G4 · Coarse 65%' : 'M5 · ePM10 50%';\n    const dG448 = showG4 ? curve(POLY.g4[48]) : '';\n    const dG498 = showG4 ? curve(POLY.g4[98]) : '';\n    const dM548 = showM5 ? curve(POLY.m5[48]) : '';\n    const dM598 = showM5 ? curve(POLY.m5[98]) : '';\n    const rG4 = showG4 ? '3.2' : '0';\n    const rM5 = showM5 ? '3.2' : '0';\n    const opG4 = showG4 ? '1' : '0.28';\n    const opM5 = showM5 ? '1' : '0.28';\n\n    // Surface frontale (m²) → vitesse de passage réelle = Q / (3600 × S)\n    const areaNum = (Math.max(50, s.len) / 1000) * (Math.max(50, s.wid) / 1000);\n    const velNum = (s.debit / 3600) / areaNum;\n    // ΔP de l'efficacité sélectionnée à la vitesse réelle\n    const dpInitNum = pdc(co, velNum);\n    const dpFinalNum = dpInitNum + ADD[eff];          // EN 13053\n    const dpAvgNum = (dpInitNum + dpFinalNum) / 2;     // = init + ADD/2\n\n    // Points de fonctionnement sur les 4 courbes, à la vitesse courante\n    const vClamp = Math.min(velNum, Vmax);\n    const vr = vClamp / Vnom;\n    const mxNum = mapX(vClamp);\n    const markerX = mxNum.toFixed(1);\n    const guideX = mxNum.toFixed(1);\n    const yG448 = mapY(pdc(POLY.g4[48], vr)).toFixed(1);\n    const yG498 = mapY(pdc(POLY.g4[98], vr)).toFixed(1);\n    const yM548 = mapY(pdc(POLY.m5[48], vr)).toFixed(1);\n    const yM598 = mapY(pdc(POLY.m5[98], vr)).toFixed(1);\n    // Point de fonctionnement sélectionné (efficacité + épaisseur) mis en évidence\n    const selColor = eff === 'g4' ? (s.thick === 48 ? '#0F3261' : '#6B8FC2')\n                                  : (s.thick === 48 ? '#0897A5' : '#7FCBD3');\n    const selShown = (eff === 'g4' && showG4) || (eff === 'm5' && showM5);\n    const selYNum = mapY(dpInitNum);\n    const selY = selYNum.toFixed(1);\n    const selR = selShown ? '5.5' : '0';\n    const selDp = selShown ? fr(dpInitNum) + ' Pa' : '';\n    const selLblX = (mxNum - 9).toFixed(1);\n    const selLblY = (selYNum - 9).toFixed(1);\n    // Rappel ΔP initiale à 3400 m³/h (592×592) pour les 4 configurations\n    const refLine = 'G4·Coarse ' + fr(pdc(POLY.g4[48], Vnom)) + ' / ' + fr(pdc(POLY.g4[98], Vnom)) + ' Pa  ·  M5·ePM10 ' + fr(pdc(POLY.m5[48], Vnom)) + ' / ' + fr(pdc(POLY.m5[98], Vnom)) + ' Pa';\n\n    const power = (s.debit / 3600) * dpAvgNum / (s.eta / 100);\n    const kwhNum = power / 1000 * s.heures;\n    const costNum = kwhNum * s.prix;\n    const co2Num = kwhNum * 0.052;\n\n    // Étiquette énergétique basée sur la ΔP moyenne (perte de charge)\n    // Échelle de jauge : 90 Pa (très économe) → 300 Pa (très énergivore)\n    const gPct = Math.max(0, Math.min(100, ((dpAvgNum - 90) / (300 - 90)) * 100));\n    const CLASSES = [\n      { max: 120, l: 'A', c: '#1B9E5A', v: 'Filtre très économe' },\n      { max: 150, l: 'B', c: '#5BAE3A', v: 'Faible consommation' },\n      { max: 180, l: 'C', c: '#9DC23A', v: 'Consommation modérée' },\n      { max: 210, l: 'D', c: '#F2C53D', v: 'Consommation moyenne' },\n      { max: 240, l: 'E', c: '#EBA02E', v: 'Consommation élevée' },\n      { max: 270, l: 'F', c: '#E0712B', v: 'Filtre énergivore' },\n      { max: 1e9, l: 'G', c: '#D6402F', v: 'Très énergivore' },\n    ];\n    const cls = CLASSES.find(c => dpAvgNum <= c.max);\n    // Aiguille du compteur : 180° (gauche/vert) → 0° (droite/rouge)\n    const gAng = Math.PI * (1 - gPct / 100);\n    const needleXNum = 100 + 60 * Math.cos(gAng);\n    const needleYNum = 95 - 60 * Math.sin(gAng);\n\n    const btnBase = 'flex:1; padding:8px 6px; border-radius:6px; font-size:11.5px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .12s; ';\n    const on = 'background:#0897A5; border:1.5px solid #0897A5; color:#fff;';\n    const off = 'background:#fff; border:1.5px solid #C9D7E8; color:#0F3261; box-shadow:none;';\n    const btnBaseC = 'padding:6px 13px; border-radius:6px; font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .12s; white-space:nowrap; ';\n\n    return {\n      debit: s.debit, heures: s.heures, eta: s.eta,\n      prixVal: s.prix,\n      prixLabel: s.prix.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }),\n      dG448, dG498, dM548, dM598, markerX, guideX,\n      yG448, yG498, yM548, yM598,\n      selColor, selY, selDp, selLblX, selLblY,\n      rG4, rM5, opG4, opM5,\n      dpInit: fr(dpInitNum), dpFinal: fr(dpFinalNum), dpAvg: fr(dpAvgNum),\n      effAdd: ADD[eff], effRule: RULE[eff],\n      effLabel, refLine,\n      lenVal: s.len, widVal: s.wid,\n      area: areaNum.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }),\n      vel: velNum.toLocaleString('fr-FR', { minimumFractionDigits: 1, maximumFractionDigits: 1 }),\n      onLen: e => this.setState({ len: +e.target.value }),\n      onWid: e => this.setState({ wid: +e.target.value }),\n      power: fr(power), kwh: fr(kwhNum), cost: fr(costNum), co2: fr(co2Num),\n      gaugePct: gPct.toFixed(1), classLetter: cls.l, classColor: cls.c, classVerdict: cls.v,\n      needleX: needleXNum.toFixed(1), needleY: needleYNum.toFixed(1),\n      btn48Style: btnBase + (s.thick === 48 ? on : off),\n      btn98Style: btnBase + (s.thick === 98 ? on : off),\n      btnG4Style: btnBase + (eff === 'g4' ? on : off),\n      btnM5Style: btnBase + (eff === 'm5' ? on : off),\n      dispG4Checked: showG4,\n      dispM5Checked: showM5,\n      onThick48: () => this.setState({ thick: 48 }),\n      onThick98: () => this.setState({ thick: 98 }),\n      onEffG4: () => this.setState({ eff: 'g4' }),\n      onEffM5: () => this.setState({ eff: 'm5' }),\n      onToggleG4: () => this.setState(st => {\n        const g = st.dispG4 !== false, m = !!st.dispM5;\n        if (g && !m) return {};\n        return { dispG4: !g };\n      }),\n      onToggleM5: () => this.setState(st => {\n        const g = st.dispG4 !== false, m = !!st.dispM5;\n        if (m && !g) return {};\n        return { dispM5: !m };\n      }),\n      onDebit: e => this.setState({ debit: +e.target.value }),\n      onHeures: e => this.setState({ heures: +e.target.value }),\n      onEta: e => this.setState({ eta: +e.target.value }),\n      onPrix: e => this.setState({ prix: +e.target.value }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
